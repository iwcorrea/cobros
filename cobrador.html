<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Cobrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <span class="navbar-brand">Cobrador: <span id="userDisplay"></span></span>
      <button class="btn btn-outline-light btn-sm" id="logoutBtn">Salir</button>
    </div>
  </nav>
  <div class="container mt-4">
    <div class="row">
      <div class="col-md-5">
        <div class="card">
          <div class="card-header">Registrar Cobro del Día</div>
          <div class="card-body">
            <form id="formCobro">
              <div class="mb-3">
                <label>Monto ($)</label>
                <input type="number" class="form-control" id="monto" step="0.01" required>
              </div>
              <div class="mb-3">
                <label>Cliente</label>
                <input type="text" class="form-control" id="cliente" required>
              </div>
              <div class="mb-3">
                <label>Tipo de Pago</label>
                <select class="form-select" id="tipoPago">
                  <option>Efectivo</option>
                  <option>Transferencia</option>
                  <option>Cheque</option>
                </select>
              </div>
              <div class="mb-3">
                <label>Observaciones</label>
                <textarea class="form-control" id="observaciones" rows="2"></textarea>
              </div>
              <button type="submit" class="btn btn-success w-100">Registrar Cobro</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-7">
        <div class="card">
          <div class="card-header">Mis Cobros del Día</div>
          <div class="card-body">
            <div class="alert alert-info">
              Total hoy: <strong id="totalHoy">$0.00</strong>
            </div>
            <div class="table-responsive">
              <table class="table table-sm" id="tablaCobrosHoy">
                <thead><tr><th>Cliente</th><th>Monto</th><th>Tipo</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="card mt-3">
          <div class="card-header">Historial Reciente</div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-sm" id="tablaHistorial">
                <thead><tr><th>Fecha</th><th>Cliente</th><th>Monto</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/cobrador.js"></script>
</body>
</html>
