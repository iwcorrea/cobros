<!DOCTYPE html>
<html lang="es">
<head>
  <!-- META -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Cobrador</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ESTILOS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold">
        Cobrador: <span id="userDisplay"></span>
      </span>
      <button class="btn btn-outline-light btn-sm" id="logoutBtn">Salir</button>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="container mt-4">

    <div class="row g-3">

      <!-- ================= FORMULARIO ================= -->
      <section class="col-lg-5">

        <div class="card shadow-sm border-0">
          <div class="card-header fw-bold">
            Registrar Cobro del Día
          </div>

          <div class="card-body">

            <form id="formCobro" novalidate>

              <div class="mb-3">
                <label class="form-label">Monto ($)</label>
                <input 
                  type="number" 
                  class="form-control" 
                  id="monto" 
                  step="0.01"
                  placeholder="Ej: 15000"
                  required
                >
              </div>

              <div class="mb-3">
                <label class="form-label">Cliente</label>
                <input 
                  type="text" 
                  class="form-control" 
                  id="cliente"
                  placeholder="Nombre del cliente"
                  required
                >
              </div>

              <div class="mb-3">
                <label class="form-label">Tipo de Pago</label>
                <select class="form-select" id="tipoPago">
                  <option>Efectivo</option>
                  <option>Transferencia</option>
                  <option>Cheque</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Observaciones</label>
                <textarea 
                  class="form-control" 
                  id="observaciones" 
                  rows="2"
                  placeholder="Opcional..."
                ></textarea>
              </div>

              <button type="submit" class="btn btn-success w-100" id="btnGuardar">
                Registrar Cobro
              </button>

            </form>

          </div>
        </div>

      </section>

      <!-- ================= DASHBOARD ================= -->
      <section class="col-lg-7">

        <!-- KPI -->
        <div class="card shadow-sm border-0 mb-3">
          <div class="card-body text-center">
            <h6 class="text-muted">Total Cobrado Hoy</h6>
            <h2 id="totalHoy" class="text-primary">$0.00</h2>
          </div>
        </div>

        <!-- TABLA HOY -->
        <div class="card shadow-sm border-0">
          <div class="card-header fw-bold">
            Mis Cobros del Día
          </div>

          <div class="card-body">

            <div class="table-responsive">
              <table class="table table-hover align-middle" id="tablaCobrosHoy">
                <thead class="table-light">
                  <tr>
                    <th>Cliente</th>
                    <th>Monto</th>
                    <th>Tipo</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>

          </div>
        </div>

        <!-- HISTORIAL -->
        <div class="card shadow-sm border-0 mt-3">
          <div class="card-header fw-bold">
            Historial Reciente
          </div>

          <div class="card-body">

            <div class="table-responsive">
              <table class="table table-hover align-middle" id="tablaHistorial">
                <thead class="table-light">
                  <tr>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Monto</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>

          </div>
        </div>

      </section>

    </div>

  </main>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="js/config.js" defer></script>
  <script src="js/cobrador.js" defer></script>

</body>
</html>
