<!DOCTYPE html>
<html lang="es">
<head>
  <!-- META -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEINFTEC | Inicio de sesión</title>

  <!-- SEO básico -->
  <meta name="description" content="Acceso al sistema GEINFTEC S.A.S. para colaboradores">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ESTILOS PERSONALIZADOS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <main class="container" style="max-width: 400px;">

    <!-- LOGO -->
    <div class="text-center mb-4">
      <img 
        src="./assets/logo.png" 
        alt="Logo GEINFTEC" 
        class="img-fluid"
        style="max-width: 120px;"
        loading="lazy"
      >
    </div>

    <!-- TARJETA LOGIN -->
    <div class="card shadow border-0">

      <header class="card-header bg-primary text-white text-center">
        <h4 class="mb-0">GEINFTEC S.A.S.</h4>
      </header>

      <div class="card-body">

        <!-- FORMULARIO -->
        <form id="loginForm" novalidate>

          <!-- USUARIO -->
          <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input 
              type="text" 
              class="form-control" 
              id="username" 
              placeholder="Ingrese su usuario"
              required
            >
          </div>

          <!-- CONTRASEÑA -->
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input 
              type="password" 
              class="form-control" 
              id="password" 
              placeholder="••••••••"
              required
            >
          </div>

          <!-- BOTÓN -->
          <button type="submit" class="btn btn-primary w-100">
            Ingresar
          </button>

        </form>

        <!-- MENSAJE ERROR -->
        <div 
          id="loginError" 
          class="text-danger mt-3 text-center small"
          role="alert"
        ></div>

        <hr>

        <!-- INFO -->
        <p class="text-muted small text-center mb-0">
          <strong>Equipo GEINFTEC:</strong><br>
          Ingrese sus credenciales para acceder al sistema
        </p>

      </div>
    </div>

  </main>

  <!-- SCRIPTS -->
  <script src="js/config.js" defer></script>
  <script src="js/auth.js" defer></script>

</body>
</html>
