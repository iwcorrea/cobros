<!DOCTYPE html>
<html lang="es">
<head>
  <!-- META -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin | Contabilidad</title>

  <!-- SEO -->
  <meta name="description" content="Panel administrativo de contabilidad GEINFTEC">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ESTILOS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold">Administrador</span>
      <button class="btn btn-outline-light btn-sm" id="logoutBtn">Salir</button>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="container mt-4">

    <!-- TABS -->
    <ul class="nav nav-tabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#resumen">Resumen</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#detalle">Cobros</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#cobradores">Cobradores</button>
      </li>
    </ul>

    <div class="tab-content mt-3">

      <!-- ================= RESUMEN ================= -->
      <section class="tab-pane fade show active" id="resumen">

        <div class="row g-3">

          <div class="col-md-4">
            <div class="card shadow-sm border-0 bg-success text-white text-center">
              <div class="card-body">
                <h6>Total Hoy</h6>
                <h2 id="totalHoyGeneral">$0</h2>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow-sm border-0 bg-info text-white text-center">
              <div class="card-body">
                <h6>Mes Actual</h6>
                <h2 id="totalMes">$0</h2>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow-sm border-0 bg-primary text-white text-center">
              <div class="card-body">
                <h6>Total Histórico</h6>
                <h2 id="totalHistorico">$0</h2>
              </div>
            </div>
          </div>

        </div>

        <!-- TABLA RESUMEN -->
        <div class="mt-4">
          <h5>Cobros por Cobrador (Hoy)</h5>
          <div class="table-responsive">
            <table class="table table-hover align-middle" id="tablaResumenCobradores">
              <thead class="table-light">
                <tr>
                  <th>Cobrador</th>
                  <th>Total Hoy</th>
                  <th>N° Cobros</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

      </section>

      <!-- ================= DETALLE ================= -->
      <section class="tab-pane fade" id="detalle">

        <!-- FILTROS -->
        <div class="card shadow-sm border-0 mb-3">
          <div class="card-body d-flex flex-wrap gap-2 align-items-end">

            <div>
              <label class="form-label">Filtrar por fecha</label>
              <input type="date" id="filtroFecha" class="form-control">
            </div>

            <div>
              <button class="btn btn-primary" id="btnFiltrar">Filtrar</button>
              <button class="btn btn-outline-secondary" id="btnReset">Reset</button>
            </div>

          </div>
        </div>

        <!-- TABLA -->
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle" id="tablaTodosCobros">
            <thead class="table-light">
              <tr>
                <th>Fecha</th>
                <th>Cobrador</th>
                <th>Cliente</th>
                <th>Monto</th>
                <th>Tipo</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

      </section>

      <!-- ================= COBRADORES ================= -->
      <section class="tab-pane fade" id="cobradores">

        <div class="table-responsive">
          <table class="table table-hover align-middle" id="tablaCobradores">
            <thead class="table-light">
              <tr>
                <th>Usuario</th>
                <th>Nombre</th>
                <th>Rol</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

      </section>

    </div>

  </main>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="js/config.js" defer></script>
  <script src="js/admin.js" defer></script>

</body>
</html>
