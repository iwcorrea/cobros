<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Contabilidad</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">Administrador</span>
      <button class="btn btn-outline-light btn-sm" id="logoutBtn">Salir</button>
    </div>
  </nav>
  <div class="container mt-4">
    <ul class="nav nav-tabs">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#resumen">Resumen General</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#detalle">Todos los Cobros</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#cobradores">Cobradores</button></li>
    </ul>
    <div class="tab-content mt-3">
      <!-- Resumen -->
      <div class="tab-pane fade show active" id="resumen">
        <div class="row">
          <div class="col-md-4"><div class="card bg-success text-white"><div class="card-body"><h5>Total Cobrado Hoy</h5><h2 id="totalHoyGeneral">$0</h2></div></div></div>
          <div class="col-md-4"><div class="card bg-info text-white"><div class="card-body"><h5>Total Mes Actual</h5><h2 id="totalMes">$0</h2></div></div></div>
          <div class="col-md-4"><div class="card bg-primary text-white"><div class="card-body"><h5>Total Histórico</h5><h2 id="totalHistorico">$0</h2></div></div></div>
        </div>
        <h5 class="mt-4">Cobros por Cobrador (Hoy)</h5>
        <table class="table" id="tablaResumenCobradores">
          <thead><tr><th>Cobrador</th><th>Total Hoy</th><th>N° Cobros</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <!-- Detalle -->
      <div class="tab-pane fade" id="detalle">
        <div class="mb-3">
          <label>Filtrar por fecha:</label>
          <input type="date" id="filtroFecha" class="form-control w-auto d-inline">
          <button class="btn btn-primary" id="btnFiltrar">Filtrar</button>
          <button class="btn btn-secondary" id="btnReset">Ver Todos</button>
        </div>
        <div class="table-responsive">
          <table class="table table-striped" id="tablaTodosCobros">
            <thead><tr><th>Fecha</th><th>Cobrador</th><th>Cliente</th><th>Monto</th><th>Tipo</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <!-- Cobradores -->
      <div class="tab-pane fade" id="cobradores">
        <table class="table" id="tablaCobradores">
          <thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
