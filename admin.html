<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin | Contabilidad</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold">Administrador</span>
      <button class="btn btn-outline-light btn-sm" id="logoutBtn">Salir</button>
    </div>
  </nav>

  <main class="container mt-4">

    <!-- TABS -->
    <ul class="nav nav-tabs">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#resumen">Resumen</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#detalle">Cobros</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#cobradores">Cobradores</button>
      </li>
    </ul>

    <div class="tab-content mt-3">

      <!-- RESUMEN -->
      <section class="tab-pane fade show active" id="resumen">

        <div class="row g-3">
          <div class="col-md-4">
            <div class="card bg-success text-white text-center shadow-sm border-0">
              <div class="card-body">
                <h6>Total Hoy</h6>
                <h2 id="totalHoyGeneral">$0</h2>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card bg-info text-white text-center shadow-sm border-0">
              <div class="card-body">
                <h6>Mes Actual</h6>
                <h2 id="totalMes">$0</h2>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card bg-primary text-white text-center shadow-sm border-0">
              <div class="card-body">
                <h6>Total Histórico</h6>
                <h2 id="totalHistorico">$0</h2>
              </div>
            </div>
          </div>
        </div>

        <!-- KPI -->
        <div class="alert alert-warning mt-4 text-center">
          <strong>🏆 Mejor cobrador del día:</strong>
          <span id="mejorCobrador">Calculando...</span>
        </div>

        <div class="mt-3">
          <h5>Cobros por Cobrador (Hoy)</h5>
          <div class="table-responsive">
            <table class="table table-hover" id="tablaResumenCobradores">
              <thead>
                <tr>
                  <th>Cobrador</th>
                  <th>Total Hoy</th>
                  <th>N° Cobros</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

      </section>

      <!-- DETALLE -->
      <section class="tab-pane fade" id="detalle">

        <div class="card mb-3">
          <div class="card-body d-flex flex-wrap gap-2">

            <input type="date" id="filtroFecha" class="form-control">
            <input type="text" id="buscador" class="form-control" placeholder="Buscar cliente...">

            <button class="btn btn-primary" id="btnFiltrar">Filtrar</button>
            <button class="btn btn-secondary" id="btnReset">Reset</button>
            <button class="btn btn-success" id="btnExportar">Exportar</button>

          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-striped" id="tablaTodosCobros">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Cobrador</th>
                <th>Cliente</th>
                <th>Monto</th>
                <th>Tipo</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

      </section>

      <!-- COBRADORES -->
      <section class="tab-pane fade" id="cobradores">
        <div class="table-responsive">
          <table class="table" id="tablaCobradores">
            <thead>
              <tr>
                <th>Usuario</th>
                <th>Nombre</th>
                <th>Rol</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="js/config.js" defer></script>
  <script src="js/admin.js" defer></script>

</body>
</html>
